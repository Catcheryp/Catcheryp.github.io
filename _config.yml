# ---------------- #
#   Main Configs   #
# ---------------- #
baseurl: 
url: https://pengyang.me
date_format: "ordinal"
title: Evil
subtitle: "锲而不舍，聚沙成塔."
description: "Catcher's blog"
keywords: Web Security
timezone: Asia/Shanghai
encoding: "utf-8"
side_bar_repo_limit: 5

# ---------------- #
#      Author      #
# ---------------- #
author: Catcher
organization: 0days
organization_url: https://twitter.com/catcheryp
github_username: Catcheryp
location: Harbin, China
email: catcheryp@gmail.com

# ---------------- #
#    Navigation    #
# ---------------- #
navs: 
  -
    href: /
    label: 主页
  -
    href: /archives/
    label: 归档

  -
    href: /tags/
    label: 标签

  -
    href: /links/
    label: 链接

  -
    href: /about/
    label: 关于

# ---------------- #
#       RSS        #
# ---------------- #
subscribe_rss: /feed.xml

# ---------------- #
#      Jekyll      #
# ---------------- #
markdown: kramdown
kramdown:
    input: GFM
highlighter: rouge
paginate: 15
lsi: false
quiet: false
excerpt_separator: "\n\n"
permalink: /:year/:month/:day/:title/
plugins:
    - jekyll-github-metadata
    - rouge
#     - jekyll-html-pipeline
    - jekyll-paginate
    - jekyll-sitemap
    - jekyll-feed
    - jemoji
#     - jekyll-mentions
# collections:
#     wiki:
#         output: true
#         permalink: /wiki/:path/

repository: Catcheryp/Catcheryp.github.io
github: [metadata]

# ---------------- #
#      Comments    #
# ---------------- #
# support provider: disqus, gitment, gitalk
comments_provider: gitalk
# !!!重要!!! 请修改下面这些信息为你自己申请的
# !!!Important!!! Please modify infos below to yours
# https://disqus.com
disqus:
    username: 
# https://imsun.net/posts/gitment-introduction/
gitment:
    owner: Catcheryp
    repo: blogcomments
    oauth:
        client_id: 5a59fdc570f933e0c2ee
        client_secret: 4bfb41f4315d6e67dc7d994890a4fc8bf9dee142
# https://github.com/gitalk/gitalk#install
gitalk:
    owner: Catcheryp
    repo: blogcomments
    clientID: 5a59fdc570f933e0c2ee
    clientSecret: 4bfb41f4315d6e67dc7d994890a4fc8bf9dee142
# 在使用其它评论组件时可点击显示 Disqus
lazy_load_disqus : false

# ---------------- #
#      Search      #
# ---------------- #
simple_jekyll_search:
    # 是否支持全文搜索
    fulltext: false
    # 最多显示多少条搜索结果
    limit: 10

# ---------------- #
#    Analytics     #
