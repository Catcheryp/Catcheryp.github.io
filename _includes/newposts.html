<div class="col-box">
  <div class="col-box-title" ><h3>Newest Posts</h3></div>
  <ul class="post-list">
    {% for post in site.posts limit: site.side_bar_repo_limit %}
      <li><a class="post-link" href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a></li>
    {% endfor %}
  </ul>
</div>
